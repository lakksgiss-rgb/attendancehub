applications:
  - name: attendancehub
    memory: 512M
    disk_quota: 1G
    buildpack: python_buildpack
    command: gunicorn ams.wsgi --bind 0.0.0.0:$PORT --workers 2 --threads 4
    env:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SECRET_KEY: "REPLACE_WITH_SECURE_KEY"
      # DATABASE_URL: "postgres://user:pass@host:port/dbname"
    services: []
