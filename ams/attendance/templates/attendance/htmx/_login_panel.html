<div class="glass-panel mx-auto w-full max-w-xl rounded-[30px] p-6 sm:p-8">
  <div class="rounded-[24px] border border-white/10 bg-white/5 p-6 sm:p-8">
    <div class="mb-6">
      <p class="text-sm uppercase tracking-[0.18em] text-slate-400">Secure sign in</p>
      <h2 class="font-display mt-3 text-3xl font-bold text-white">{{ title }}</h2>
      <p class="mt-3 text-sm leading-7 text-slate-300">{{ subtitle }}</p>
    </div>

    {% if error_message %}
    <div class="mb-5 rounded-2xl border border-rose-400/20 bg-rose-500/10 p-4 text-sm text-rose-100">
      {{ error_message }}
    </div>
    {% endif %}

    <div class="mb-6 flex flex-wrap gap-3 text-sm text-slate-200">
      <button
        type="button"
        hx-get="{% url 'attendance:live_login_panel' %}?role=admin"
        hx-target="#roleLogin"
        hx-swap="innerHTML"
        class="rounded-full px-4 py-2 transition {% if is_admin %}bg-white text-slate-950{% else %}bg-white/10 text-white hover:bg-white/15{% endif %}"
      >
        Admin
      </button>
      <button
        type="button"
        hx-get="{% url 'attendance:live_login_panel' %}?role=professor"
        hx-target="#roleLogin"
        hx-swap="innerHTML"
        class="rounded-full px-4 py-2 transition {% if is_faculty %}bg-white text-slate-950{% else %}bg-white/10 text-white hover:bg-white/15{% endif %}"
      >
        Faculty
      </button>
      <button
        type="button"
        hx-get="{% url 'attendance:live_login_panel' %}?role=student"
        hx-target="#roleLogin"
        hx-swap="innerHTML"
        class="rounded-full px-4 py-2 transition {% if not is_admin and not is_faculty %}bg-white text-slate-950{% else %}bg-white/10 text-white hover:bg-white/15{% endif %}"
      >
        Student
      </button>
    </div>

    <form hx-post="{% url 'attendance:live_login_submit' %}" hx-target="#roleLogin" hx-swap="innerHTML" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="role" value="{{ role }}" />

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-300">Username</span>
        <input
          name="username"
          class="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20"
          placeholder="{% if is_admin %}admin username{% elif is_faculty %}faculty username{% else %}student username or roll{% endif %}"
          required
        />
      </label>

      <label class="block">
        <span class="mb-2 block text-sm font-medium text-slate-300">Password</span>
        <input
          type="password"
          name="password"
          class="w-full rounded-2xl border border-white/10 bg-slate-950/70 px-4 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-cyan-400/60 focus:ring-2 focus:ring-cyan-400/20"
          placeholder="Enter your password"
          required
        />
      </label>

      <button type="submit" class="btn-primary mt-2 w-full">
        {% if is_admin %}Enter Admin Dashboard{% elif is_faculty %}Enter Faculty Dashboard{% else %}Enter Student Portal{% endif %}
      </button>
    </form>

    <div class="mt-6 flex items-center justify-between text-sm text-slate-400">
      <a href="/" class="transition hover:text-white">Back to home</a>
      <a href="/login?role=student" class="transition hover:text-white">Live login</a>
    </div>
  </div>
</div>
