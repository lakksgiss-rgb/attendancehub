<div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
  <h2 class="text-xl font-semibold text-slate-900">Faculty Registration</h2>
  <p class="mt-2 text-sm text-slate-600">Create a faculty account (staff access) to manage attendance and students.</p>

  <form method="post" action="{% url 'attendance:faculty_register' %}" class="mt-6 space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      {{ form.username }}
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      {{ form.password }}
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700">Confirm Password</label>
      {{ form.confirm_password }}
    </div>

    <div class="flex items-center justify-between">
      <button type="submit" class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">Register</button>
      <button type="button" class="inline-flex items-center justify-center rounded-md bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-300" hx-get="{% url 'attendance:home' %}" hx-target="#roleLogin" hx-swap="innerHTML">Cancel</button>
    </div>
  </form>
</div>
