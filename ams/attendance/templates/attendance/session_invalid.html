{% extends "attendance/base.html" %}

{% block title %}Session Invalid{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-xl border border-rose-200 bg-rose-50 p-8 shadow-sm">
  <h1 class="text-2xl font-semibold text-rose-800">Session Unavailable</h1>
  <p class="mt-3 text-sm text-rose-700">{{ message }}</p>
  <div class="mt-6">
    <a href="{% url 'attendance:home' %}" class="inline-flex items-center justify-center rounded-md bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-300">Back to Home</a>
  </div>
</div>
{% endblock %}
