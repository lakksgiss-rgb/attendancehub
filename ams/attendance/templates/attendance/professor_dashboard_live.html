{% if session_stats %}
<table class="w-full text-left text-sm">
  <thead>
    <tr class="border-b border-slate-200 text-slate-700">
      <th class="py-2">Session</th>
      <th class="py-2">Present</th>
      <th class="py-2">Total</th>
      <th class="py-2">%</th>
    </tr>
  </thead>
  <tbody>
    {% for item in session_stats %}
    <tr class="border-b border-slate-100">
      <td class="py-2">{{ item.session.subject }} ({{ item.session.section }})</td>
      <td class="py-2">{{ item.present }}</td>
      <td class="py-2">{{ item.total }}</td>
      <td class="py-2">{{ item.percentage }}%</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">
  No active sessions to display.
</div>
{% endif %}
