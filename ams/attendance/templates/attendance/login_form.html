<div class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
  <h2 class="text-xl font-semibold text-slate-900">{{ role|title }} Login</h2>
  <p class="mt-1 text-sm text-slate-600">Enter your credentials to access the system.</p>

  {% if messages %}
  <div class="mt-4 space-y-2">
    {% for message in messages %}
    <div class="rounded-md border p-3 text-sm {% if message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-800{% else %}border-emerald-200 bg-emerald-50 text-emerald-800{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  {% if role == 'professor' %}
  <form method="post" action="{% url 'attendance:professor_login' %}" class="mt-6 space-y-4" hx-post="{% url 'attendance:professor_login' %}" hx-target="#roleLogin" hx-swap="innerHTML">
  {% else %}
  <form method="post" action="{% url 'attendance:student_login' %}" class="mt-6 space-y-4" hx-post="{% url 'attendance:student_login' %}" hx-target="#roleLogin" hx-swap="innerHTML">
  {% endif %}
    {% csrf_token %}
    <input type="hidden" name="role" value="{{ role }}" />

    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      <input name="username" type="text" class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring focus:ring-blue-200" required />
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input name="password" type="password" class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring focus:ring-blue-200" required />
    </div>

    <div class="flex items-center justify-between">
      <button type="submit" class="inline-flex items-center justify-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">Login</button>
      <a href="{% url 'attendance:student_register' %}" class="text-sm font-medium text-blue-600 hover:text-blue-700">Register</a>
    </div>
  </form>
</div>
