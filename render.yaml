services:
  - type: web
    name: attendancehub
    env: python
    plan: free
    buildCommand: pip install -r requirements-web.txt
    startCommand: bash -lc "python ams/manage.py migrate --noinput && python ams/manage.py collectstatic --noinput && gunicorn ams.wsgi --bind 0.0.0.0:$PORT"
    env:
      # Do NOT store secrets here; set them in the Render dashboard environment variables.
      DJANGO_DEBUG: "false"
      PYTHONUNBUFFERED: "1"
